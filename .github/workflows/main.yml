name: Build Zip and Update Metadata

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/tagImagesFromGalleries/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------
      # Get commit info
      # ---------------------------------
      - name: Get commit info
        id: commit
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Get commit timestamp in seconds
          COMMIT_TS=$(git log -1 --pretty=format:'%ct')
          # Format as YYYY-MM-DD HH:MM:SS
          COMMIT_DATE=$(date -d @$COMMIT_TS +"%Y-%m-%d %H:%M:%S")
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE" >> $GITHUB_OUTPUT

      # ---------------------------------
      # Build zip directly into plugins/
      # ---------------------------------
      - name: Build tagImagesFromGalleries.zip
        run: |
          cd plugins
          zip -r tagImagesFromGalleries.zip tagImagesFromGalleries

      # ---------------------------------
      # Calculate SHA256 of committed zip
      # ---------------------------------
      - name: Calculate SHA256
        id: hash
        run: |
          HASH=$(sha256sum plugins/tagImagesFromGalleries.zip | awk '{ print $1 }')
          echo "sha256=$HASH" >> $GITHUB_OUTPUT

      # ---------------------------------
      # Update manifest.yml
      # ---------------------------------
      - name: Update version, date, and sha256
        run: |
          FILE="plugins/manifest.yml"

          sed -i "s|version:.*|version: 1.0${{ steps.commit.outputs.sha }}|" $FILE
          sed -i "s|date:.*|date: ${{ steps.commit.outputs.date }}|" $FILE
          sed -i "s|sha256:.*|sha256: ${{ steps.hash.outputs.sha256 }}|" $FILE

      # ---------------------------------
      # Commit changes
      # ---------------------------------
      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add plugins/tagImagesFromGalleries.zip
          git add plugins/manifest.yml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build zip and update metadata (1.0-${{ steps.commit.outputs.sha }})"
            git push
          fi
